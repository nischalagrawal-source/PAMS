name: Auto Deploy VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            if [ ! -d "/var/www/pams/.git" ]; then
              echo "Missing /var/www/pams git checkout. Run initial VPS setup and first deploy once."
              exit 1
            fi

            cd /var/www/pams
            bash deploy/deploy.sh