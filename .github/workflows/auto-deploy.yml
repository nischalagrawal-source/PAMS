name: Auto Deploy VPS

on:
  push:
    branches:
      - master
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Preflight production SSH connectivity
        if: github.ref == 'refs/heads/master'
        env:
          PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          PROD_VPS_PORT: ${{ secrets.PROD_VPS_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_VPS_HOST:-}" ] || [ -z "${PROD_VPS_PORT:-}" ]; then
            echo "ERROR: PROD_VPS_HOST or PROD_VPS_PORT secret is missing"
            exit 1
          fi

          if ! [[ "$PROD_VPS_PORT" =~ ^[0-9]+$ ]]; then
            echo "ERROR: PROD_VPS_PORT must be numeric. Current value is invalid."
            exit 1
          fi

          echo "Testing TCP connectivity to production VPS on port ${PROD_VPS_PORT}..."
          for attempt in 1 2 3; do
            if timeout 8 bash -c "</dev/tcp/${PROD_VPS_HOST}/${PROD_VPS_PORT}" 2>/dev/null; then
              echo "SSH TCP connectivity check passed on attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt} failed. Retrying in 3 seconds..."
            sleep 3
          done

          echo "ERROR: Cannot reach production VPS on ${PROD_VPS_PORT}."
          echo "Hint: Verify VPS firewall/security group allow SSH from GitHub-hosted runners and confirm PROD_VPS_HOST/PORT secrets."
          exit 1

      - name: Deploy production on VPS over SSH
        if: github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          port: ${{ secrets.PROD_VPS_PORT }}
          timeout: 30s
          command_timeout: 40m
          script: |
            set -e
            cd /var/www/pams
            bash deploy/deploy.sh master "http://127.0.0.1:3000/api/health"

      - name: Preflight staging SSH connectivity
        if: github.ref == 'refs/heads/staging'
        env:
          STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_VPS_PORT: ${{ secrets.STAGING_VPS_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${STAGING_VPS_HOST:-}" ] || [ -z "${STAGING_VPS_PORT:-}" ]; then
            echo "ERROR: STAGING_VPS_HOST or STAGING_VPS_PORT secret is missing"
            exit 1
          fi

          if ! [[ "$STAGING_VPS_PORT" =~ ^[0-9]+$ ]]; then
            echo "ERROR: STAGING_VPS_PORT must be numeric. Current value is invalid."
            exit 1
          fi

          echo "Testing TCP connectivity to staging VPS on port ${STAGING_VPS_PORT}..."
          for attempt in 1 2 3; do
            if timeout 8 bash -c "</dev/tcp/${STAGING_VPS_HOST}/${STAGING_VPS_PORT}" 2>/dev/null; then
              echo "SSH TCP connectivity check passed on attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt} failed. Retrying in 3 seconds..."
            sleep 3
          done

          echo "ERROR: Cannot reach staging VPS on ${STAGING_VPS_PORT}."
          echo "Hint: Verify VPS firewall/security group allow SSH from GitHub-hosted runners and confirm STAGING_VPS_HOST/PORT secrets."
          exit 1

      - name: Deploy staging on VPS over SSH
        if: github.ref == 'refs/heads/staging'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT }}
          timeout: 30s
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/pams
            bash deploy/deploy.sh staging "http://127.0.0.1:3000/api/health"

      - name: Notify Slack (production)
        if: always() && github.ref == 'refs/heads/master'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "Slack webhook not configured for production; skipping"
            exit 0
          fi

          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"[P&AMS][PROD] Deploy ${STATUS} | ${REPO}@${BRANCH} | ${SHA} | ${URL}\"}" \
            "$SLACK_WEBHOOK"

      - name: Notify Slack (staging)
        if: always() && github.ref == 'refs/heads/staging'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_STAGING }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "Slack webhook not configured for staging; skipping"
            exit 0
          fi

          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"[P&AMS][STAGING] Deploy ${STATUS} | ${REPO}@${BRANCH} | ${SHA} | ${URL}\"}" \
            "$SLACK_WEBHOOK"

      - name: Notify WhatsApp (production)
        if: always() && github.ref == 'refs/heads/master'
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_TO_NUMBER: ${{ secrets.WHATSAPP_TO_NUMBER_PROD }}
        run: |
          if [ -z "$WHATSAPP_ACCESS_TOKEN" ] || [ -z "$WHATSAPP_PHONE_NUMBER_ID" ] || [ -z "$WHATSAPP_TO_NUMBER" ]; then
            echo "WhatsApp secrets not configured for production; skipping"
            exit 0
          fi

          STATUS="${{ job.status }}"
          MSG="P&AMS PROD deploy ${STATUS}. Repo: ${{ github.repository }}, Branch: ${{ github.ref_name }}, SHA: ${{ github.sha }}"

          curl -X POST "https://graph.facebook.com/v21.0/${WHATSAPP_PHONE_NUMBER_ID}/messages" \
            -H "Authorization: Bearer ${WHATSAPP_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"messaging_product\":\"whatsapp\",\"to\":\"${WHATSAPP_TO_NUMBER}\",\"type\":\"text\",\"text\":{\"body\":\"${MSG}\"}}"

      - name: Notify WhatsApp (staging)
        if: always() && github.ref == 'refs/heads/staging'
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_TO_NUMBER: ${{ secrets.WHATSAPP_TO_NUMBER_STAGING }}
        run: |
          if [ -z "$WHATSAPP_ACCESS_TOKEN" ] || [ -z "$WHATSAPP_PHONE_NUMBER_ID" ] || [ -z "$WHATSAPP_TO_NUMBER" ]; then
            echo "WhatsApp secrets not configured for staging; skipping"
            exit 0
          fi

          STATUS="${{ job.status }}"
          MSG="P&AMS STAGING deploy ${STATUS}. Repo: ${{ github.repository }}, Branch: ${{ github.ref_name }}, SHA: ${{ github.sha }}"

          curl -X POST "https://graph.facebook.com/v21.0/${WHATSAPP_PHONE_NUMBER_ID}/messages" \
            -H "Authorization: Bearer ${WHATSAPP_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"messaging_product\":\"whatsapp\",\"to\":\"${WHATSAPP_TO_NUMBER}\",\"type\":\"text\",\"text\":{\"body\":\"${MSG}\"}}"
